<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q4 1st Graded Exercise">
    <meta name="keywords" content="Movie Rating">
    <meta name="author" content="Liuz Cabrera">
    <title>Movie Rating</title>
    <link rel="icon" href="../../assets/mowiewowie.png" sizes="32x32" type="image/png">
    <style>

            table {
        border-collapse: collapse;
        width: 100%;
    }

    table, th, td {
        border: 3px solid black;
        padding: 5px;
        background-color: rgb(82, 192, 243);
        text-align: center;
        font-size: 1.5rem;
        box-shadow: 2px 2px 5px black;
    }


        body {
            font-size: 2rem;
            background-color: rgb(140, 217, 228);
        }

        .selected {
            color: rgb(236, 236, 49);
        }

        .header {
            text-align: center;
        }

        .movieform {
            margin: auto;
            justify-items: center;
            text-align: center;
            border: solid 4px black;
            width: 60%;
            padding-bottom: 1rem;
            background-color:rgb(106, 113, 221);
        }

        .movielist {
            margin: auto;
            margin-top: 1rem;
            justify-items: center;
            text-align: center;
            width: 60%;
            border: dotted 3px black;
        }

        .movieadd {
            width: 30%;
            font-size: 1.5rem;
        }

        .movieadd:hover {
            width: 25%;
            background-color:rgb(34, 121, 121);
            color: azure;
            transition-duration: 0.5s;
        }

        .stars:hover {
            cursor: pointer;
        }
        
        #title {
            width: 30%;
            font-size: 1.5rem;
        }

        #year {
            width: 30%;
            font-size: 1.5rem;
        }

        #genre {
            width: 30%;
            font-size: 1.5rem;
        }

        header {
        background-color:#a887f7;
        width: 50%;
        padding: 0.5rem;
        border: solid rgb(44, 44, 44) 3px;
        font-size: 1.3rem;
        margin: auto;
    }

    </style>
  </head>
<body>
         <header>
        <div>
            <h1>
                Movie Rating
            </h1>
            <h3>by Liuz Cabrera</h3>
        </div>
        <nav class="navbar">
            <a href="../../index.html"> Home </a> <br>
        </nav>
    </header>
    <div class="movieform">
    <h2 class="header">Add a Movie</h2>
    
    <label for="title">Title:</label>
    <input type="text" id="title">
    <br/> <br/>
    
    <label for="year">Year:</label>
    <input type="number" id="year">
    <br/> <br/>
    
    <label for="genre">Genre:</label>
    <select id="genre">
      <option value="Fantasy">Fantasy</option>
      <option value="Horror">Horror</option>
      <option value="Adventure">Adventure</option>
      <option value="Sci-Fi">Sci-Fi</option>
    </select>
    <br/> <br/>
    
    <label>Rating:</label>
    <div class="stars" id="ratingStars">
      <span class="star" data-value="1">&#9733;</span>
      <span class="star" data-value="2">&#9733;</span>
      <span class="star" data-value="3">&#9733;</span>
      <span class="star" data-value="4">&#9733;</span>
      <span class="star" data-value="5">&#9733;</span>
    </div>
    <br/>
    
    <button class="movieadd" onclick="addMovie();">Add Movie</button> <br>
    <button class="movieadd" onclick="showMovie();">Show/Update Movies</button>
    </div>
    
    <div class="movielist">
    <h2>Movie List</h2>
    <table id="movieList"></table>
    </div>
